{% extends "shop/base.html" %}

{% block content %}

<div class="form-box">
    <h1>Logowanie</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn" type="submit">
            Zaloguj
        </button>
    </form>

    <p>
        Nie masz konta?
        <a href="/register/">Zarejestruj się</a>
    </p>
</div>

{% endblock %}
